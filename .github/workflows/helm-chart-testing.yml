name: Helm chart linting and testing

on:
  pull_request:
    branches: [main]
    paths:
      - 'charts/**'
  merge_group:
  workflow_dispatch:

permissions:
  contents: write
  checks: write

# Only allow a single concurrent run per branch. Cancel in-progress runs on multiple pushes when not on main branch.  
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'main')}}

jobs:
  helm-lint:
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.list-changed.outputs.changed }}
      needsbump: ${{ steps.lint.outputs.needsbump }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.2.0 # helm version updated by renovate

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Add repositories
        run: | 
          helm repo add opentelemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add solr https://solr.apache.org/charts

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else 
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        id: lint
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          output=$(ct lint --target-branch ${{ github.event.repository.default_branch }} --validate-maintainers=false 2>&1)
          exit_code=$?
          echo "$output"
          if echo "$output" | grep -q 'chart version not ok. Needs a version bump!'; then
            echo "needsbump=true" >> "$GITHUB_OUTPUT"
          else
            echo "needsbump=false" >> "$GITHUB_OUTPUT"
          fi
          exit $exit_code

  helm-test:
    runs-on: ubuntu-24.04
    needs: helm-lint
    if: ${{ needs.helm-lint.outputs.changed == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: authenticate with docker hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.2.0 # helm version updated by renovate

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Add repositories
        run: | 
          helm repo add opentelemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add solr https://solr.apache.org/charts

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Run chart-testing (install)
        run: ct install --target-branch ${{ github.event.repository.default_branch }}

  bump-chart:
    runs-on: ubuntu-24.04
    needs: helm-lint
    if: ${{ failure() && needs.helm-lint.outputs.needsbump == 'true' && github.event_name == 'pull_request' }}
    steps:
      # To allow pushing to PR branch (needed for next step) we need to be on the pr branch
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.WORKFLOW_HELM_CHART_BUMP_GITHUB_PAT }}

      # Bump Chart version and push to PR branch with personal token (to retrigger workflow)
      - name: Test if chart version needs bump
        run: |
          pip install pybump==1.12.6
          pybump bump --file charts/zac/Chart.yaml --level patch
          git config user.name github-actions
          git config user.email github-actions@github.com
          git commit -am "bumped helm chart"
          git push

  helm-docs:
    runs-on: ubuntu-24.04
    needs: helm-lint
    if: ${{ needs.helm-lint.outputs.changed == 'true' && github.event_name == 'pull_request' }}
    steps:
      # To allow pushing to PR branch (needed for next step) we need to be on the pr branch
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.WORKFLOW_HELM_CHART_BUMP_GITHUB_PAT }}

      - name: Generate updated helm docs if needed and on PR
        uses: losisin/helm-docs-github-action@3a4528e97c49a5e83de6b78c50c61c8ee5c9f944 # v2.0.0
        with:
          git-push: true
