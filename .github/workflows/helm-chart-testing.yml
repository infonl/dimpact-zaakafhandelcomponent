name: Helm chart linting and testing

on:
  # NOTE: deliberately NOT path-filtered on 'charts/**'. The 'helm-status' job below is a
  # required status check; a path filter would prevent it from reporting on non-chart PRs,
  # deadlocking them (and the merge queue) on "Expected — Waiting for status to be reported".
  # Change detection happens inside the workflow via the 'list-changed' step instead.
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: write
  checks: write

# Only allow a single concurrent run per branch. Cancel in-progress runs on multiple pushes when not on main branch.  
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'main')}}

jobs:
  helm-lint:
    runs-on: ubuntu-24.04
    outputs: 
      changed: ${{ steps.list-changed.outputs.changed }}
      needsbump: ${{ steps.testbump.outputs.needsbump }} 
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.2 # helm version updated by renovate

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Add repositories
        run: | 
          helm repo add opentelemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add solr https://solr.apache.org/charts

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else 
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }} --validate-maintainers=false

      - name: Test if chart version needs bump
        id: testbump
        if: ${{ always() && steps.list-changed.outputs.changed == 'true' && github.event_name == 'pull_request' }}
        run: |
          set +e
          ct lint --target-branch ${{ github.event.repository.default_branch }} | grep -q 'chart version not ok. Needs a version bump!'
          needsBump=$?

          if [ $needsBump -eq 0 ]; then
            echo "needsbump=true" >> "$GITHUB_OUTPUT"
          else
            echo "needsbump=false" >> "$GITHUB_OUTPUT"
          fi

  helm-test:
    runs-on: ubuntu-24.04
    needs: helm-lint
    if: ${{ needs.helm-lint.outputs.changed == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: authenticate with docker hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.2 # helm version updated by renovate

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Add repositories
        run: | 
          helm repo add opentelemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add solr https://solr.apache.org/charts

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Run chart-testing (install)
        continue-on-error: true
        run: |
          ct install --target-branch ${{ github.event.repository.default_branch }} \
          --helm-extra-args "--values=charts/zac/ci/zac-chart-test-values.yaml"

  bump-chart:
    runs-on: ubuntu-24.04
    needs: helm-lint
    if: ${{ failure() && needs.helm-lint.outputs.needsbump == 'true' && github.event_name == 'pull_request' }}
    steps:
      # To allow pushing to PR branch (needed for next step) we need to be on the pr branch
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.WORKFLOW_HELM_CHART_BUMP_GITHUB_PAT }}

      # Bump Chart version and push to PR branch with personal token (to retrigger workflow)
      - name: Test if chart version needs bump
        run: |
          pip install pybump==1.12.6
          pybump bump --file charts/zac/Chart.yaml --level patch
          git config user.name github-actions
          git config user.email github-actions@github.com
          git commit -am "bumped helm chart"
          git push

  helm-docs:
    runs-on: ubuntu-24.04
    # Depend on bump-chart so the two jobs never push to the PR branch concurrently.
    # Skip when bump-chart just pushed a version bump: that push re-triggers a fresh run
    # in which the chart is already bumped and this job regenerates the docs cleanly.
    needs: [helm-lint, bump-chart]
    if: >-
      ${{ always() && needs.helm-lint.outputs.changed == 'true' &&
      github.event_name == 'pull_request' && needs.bump-chart.result != 'success' }}
    steps:
      # To allow pushing to PR branch (needed for next step) we need to be on the pr branch
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.WORKFLOW_HELM_CHART_BUMP_GITHUB_PAT }}

      - name: Capture HEAD before generating docs
        id: head-before
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate updated helm docs if needed and on PR
        uses: losisin/helm-docs-github-action@3a4528e97c49a5e83de6b78c50c61c8ee5c9f944 # v2.0.0
        with:
          git-push: true

      # If docs were regenerated and pushed, fail this run so the required 'helm-status' check
      # stays red until the new commit (pushed with a PAT, which re-triggers CI) is validated.
      # This prevents auto-merge / the merge queue from merging before the docs commit lands.
      - name: Fail if helm docs were regenerated
        run: |
          if [ "$(git rev-parse HEAD)" != "${{ steps.head-before.outputs.sha }}" ]; then
            echo "::error::Helm docs were out of date and have been regenerated and pushed. Failing so the gate re-evaluates on the new commit."
            exit 1
          fi

  # Single aggregated status meant to be the ONLY helm-related required status check on 'main'.
  # It always runs (on pull_request and merge_group), so it never deadlocks path-filtered PRs,
  # and it reflects the outcome of the helm jobs so native auto-merge and the merge queue wait
  # for chart linting/testing/bumping/docs before merging.
  helm-status:
    runs-on: ubuntu-24.04
    needs: [helm-lint, helm-test, helm-docs]
    if: ${{ always() }}
    steps:
      - name: Aggregate helm check results
        run: |
          echo "helm-lint=${{ needs.helm-lint.result }} helm-test=${{ needs.helm-test.result }} helm-docs=${{ needs.helm-docs.result }}"
          for result in "${{ needs.helm-lint.result }}" "${{ needs.helm-test.result }}" "${{ needs.helm-docs.result }}"; do
            case "$result" in
              success|skipped) ;;
              *) echo "::error::A required helm job did not succeed (result: $result)."; exit 1 ;;
            esac
          done
