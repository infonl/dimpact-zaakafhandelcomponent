name: Publish NVD Database Cache

# Builds the OWASP Dependency-Check NVD database once, centrally, and publishes
# it as a GHCR image (ghcr.io/infonl/nvd-database-cache). The Dependency
# Security Scan workflow then consumes that image instead of downloading from
# the rate-limited NVD API on every run.
#
# Each run seeds from the previously published image and only fetches the NVD
# delta, so the slow cold download happens at most once. Because the image lives
# in GHCR (not the 10GB Actions cache), it is never evicted.

on:
  schedule:
    # A few hours before the Dependency Security Scan (06:00 UTC) so the scan
    # always finds a fresh image.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      seed_database:
        description: "Force a full cold NVD download. Use for the very first run, before any image exists."
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: "25.0.3"
  NVD_DATABASE_CACHE_IMAGE: ghcr.io/infonl/nvd-database-cache

jobs:
  publish:
    name: Build and publish NVD database cache image
    # INFO runner as NVD download is heavily throttled from github IPs
    runs-on: [Linux, X64, ubuntu-24.04]
    # Normal (incremental) runs finish in minutes. A seed run (seed_database=true)
    # performs a full cold NVD download, which - because the NVD API heavily and
    # unpredictably rate-limits CI egress IPs - can take many hours; it runs on a
    # self-hosted runner without the 360 min hosted-runner hard limit, so it gets
    # a generous ceiling.
    timeout-minutes: ${{ (inputs.seed_database == true) && 600 || 90 }}
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore previous database from the published image
        id: restore
        # For an incremental run, seed the local data directory from the
        # previously published image so the NVD update only fetches the delta.
        # For a seed run (seed_database=true) we deliberately skip this and start
        # empty: seeding from a possibly-incomplete image could make Dependency
        # Check do a "modified-only" update and mark a still-incomplete database
        # as complete. A seed run must be a clean, full rebuild.
        run: |
          mkdir -p ~/.gradle/dependency-check-data
          if [ "${{ inputs.seed_database }}" = "true" ]; then
            echo "had_previous=false" >> "$GITHUB_OUTPUT"
            echo "Seed run - building a fresh database from scratch (not seeding from the previous image)."
          elif docker pull "${NVD_DATABASE_CACHE_IMAGE}:latest"; then
            container_id=$(docker create "${NVD_DATABASE_CACHE_IMAGE}:latest")
            cleanup() { docker rm -f "${container_id}" >/dev/null 2>&1 || true; }
            trap cleanup EXIT
            docker cp "${container_id}:/dependency-check-data/." ~/.gradle/dependency-check-data/
            cleanup
            trap - EXIT
            echo "had_previous=true" >> "$GITHUB_OUTPUT"
            echo "✅ Restored database from the previous image."
          else
            echo "had_previous=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No previous NVD database image found - run this workflow with seed_database=true to build the initial database."
          fi

      - name: Update NVD database
        id: update
        run: |
          if [ -z "${NVD_API_KEY}" ]; then
            echo "::warning::NVD_API_KEY is not set - NVD downloads use the slow rate limit and may time out."
          fi
          # --no-daemon + (for incremental runs) `timeout -k` so a timeout
          # terminates the actual build instead of leaving a daemon writing the
          # data directory. Capture whether the update genuinely succeeded so we
          # never republish a stale/incomplete database as if it were fresh.
          #
          # Seed runs are NOT step-timeout-capped: a full cold download is subject
          # to severe, variable NVD throttling and may legitimately take many
          # hours. It is bounded only by the (large) job timeout. Incremental runs
          # are capped tightly because they should only fetch a small delta.
          if [ "${{ inputs.seed_database }}" = "true" ]; then
            echo "Seed run - performing a full NVD download with no step timeout."
            update_command=(./gradlew dependencyCheckUpdate --no-configuration-cache --no-daemon)
          else
            echo "Incremental run - capping the NVD update at 45m."
            update_command=(timeout -k 30s 45m ./gradlew dependencyCheckUpdate --no-configuration-cache --no-daemon)
          fi
          if "${update_command[@]}"; then
            echo "update_ok=true" >> "$GITHUB_OUTPUT"
            echo "✅ NVD update completed."
          else
            echo "update_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::NVD update did not complete successfully."
          fi
          ./gradlew --stop || true

      - name: Verify the update succeeded and assemble the image context
        # Only ever publish a fully-updated database. If the update did not
        # complete we deliberately do NOT publish anything: a partial database
        # published as the ':latest' image would be pulled by the next
        # incremental run, which could do a "modified-only" update on top of the
        # gaps and wrongly mark it complete - silently shipping an incomplete
        # vulnerability database. Failing without publishing keeps the previous
        # good image (if any) in place and makes the problem visible.
        run: |
          # Locate the H2 database with `find` rather than a fixed-depth glob:
          # because build.gradle.kts overrides data.directory, odc.mv.db sits
          # directly in that directory (not in a version subdirectory), so a
          # `*/odc.mv.db` glob would miss it and a completed build would be
          # wrongly reported as having produced no database.
          database_file=$(find ~/.gradle/dependency-check-data -name odc.mv.db -type f 2>/dev/null | head -1 || true)
          if [ -z "${database_file}" ]; then
            echo "::error::No NVD database was produced; refusing to publish an empty image."
            exit 1
          fi
          # Locate the H2 database with `find` rather than a fixed-depth glob:
          # because build.gradle.kts overrides data.directory, odc.mv.db sits
          # directly in that directory (not in a version subdirectory), so a
          # `*/odc.mv.db` glob would miss it and a completed build would be
          # wrongly reported as having produced no database.
          database_file=$(find ~/.gradle/dependency-check-data -name odc.mv.db -type f 2>/dev/null | head -1 || true)
          if [ -z "${database_file}" ]; then
            echo "::error::Update reported success but no NVD database was found; refusing to publish an empty image."
            exit 1
          fi
          echo "NVD database size: $(du -m "${database_file}" | cut -f1) MB"

          rm -rf nvd-image-context
          mkdir -p nvd-image-context
          cp -r ~/.gradle/dependency-check-data nvd-image-context/data
          printf 'updated_at=%s\nstatus=complete\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > nvd-image-context/build-metadata.txt
          echo "Image freshness metadata:"
          cat nvd-image-context/build-metadata.txt

      - name: Build and push NVD database cache image
        run: |
          docker build \
            -f scripts/docker/nvd-database-cache/Dockerfile \
            -t "${NVD_DATABASE_CACHE_IMAGE}:latest" \
            nvd-image-context
          docker push "${NVD_DATABASE_CACHE_IMAGE}:latest"
          echo "✅ Published ${NVD_DATABASE_CACHE_IMAGE}:latest"

