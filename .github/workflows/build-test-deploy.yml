name: Build, test & deploy

on:
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Select the version bump for a sprint release.'
        type: choice
        required: true
        default: 'minor'
        options:
          - minor
          - major
      hotfix_version:
        description: 'Explicit version for hotfix branch (e.g. 1.4.7). Required when dispatching on a hotfix/* branch.'
        type: string
        required: false
  push:
    branches:
      - main
    paths-ignore:
      # ignore pushes to the publiccode.yaml file or else we would trigger an endless build loop
      - 'publiccode.yaml'

env:
  JAVA_VERSION: "21.0.10"
  CONTAINER_REGISTRY_URL: "ghcr.io/infonl"
  APPLICATION_NAME: "zaakafhandelcomponent"

permissions:
  contents: write
  packages: write
  checks: write
  pull-requests: write
  # Required for uploading SARIF reports
  security-events: write

# Only allow a single concurrent run per branch. Cancel in-progress runs on multiple pushes when not on main branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'main')}}

jobs:
  validate-input:
    runs-on: ubuntu-24.04
    outputs:
      version-bump: ${{ github.event.inputs.confirm || 'minor' }}
    steps:
      - name: Use selected version bump
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          echo "Version will be bumped to next ${{ github.event.inputs.confirm || 'minor' }} number."

      - name: Manual version bump only allowed on main branch
        if: ${{ github.ref != 'refs/heads/main' && github.event_name == 'workflow_dispatch' && (!startsWith(github.ref_name, 'hotfix/') || github.event.inputs.hotfix_version == '') }}
        run: |
          echo "Version bump input only valid on main (hotfix branches require explicit hotfix_version)."
          exit 1

  determine-version:
    runs-on: ubuntu-24.04
    needs: [validate-input]
    outputs:
      version: ${{ steps.set-hotfix-version.outputs.version || steps.calc-version.outputs.version }}
      tag: ${{ steps.set-hotfix-version.outputs.tag || steps.calc-version.outputs.tag }}
      release-type: ${{ steps.release-type.outputs.release-type }}
      previous-tag: ${{ steps.prev-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Ensure hotfix_version input provided
        if: startsWith(github.ref_name, 'hotfix/')
        run: |
          if [ -z "${{ github.event.inputs.hotfix_version }}" ]; then
            echo "hotfix_version input is required when running on a hotfix/* branch."
            exit 1
          fi

      - name: Validate semantic version pattern
        if: startsWith(github.ref_name, 'hotfix/')
        run: |
          V='${{ github.event.inputs.hotfix_version }}'
          if ! echo "$V" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$'; then
            echo "hotfix_version '$V' is not a valid semantic version (expected: N.N.N or N.N.N-suffix)."
            exit 1
          fi

      - name: Check hotfix tag does not already exist
        if: startsWith(github.ref_name, 'hotfix/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V='${{ github.event.inputs.hotfix_version }}'
          if git ls-remote --exit-code --tags origin "refs/tags/v${V}" >/dev/null 2>&1; then
            echo "Tag v${V} already exists. Choose a different version."
            exit 1
          fi

      - name: Set hotfix version outputs
        if: startsWith(github.ref_name, 'hotfix/')
        id: set-hotfix-version
        run: |
          echo "version=${{ github.event.inputs.hotfix_version }}" >> "$GITHUB_OUTPUT"
          echo "tag=v${{ github.event.inputs.hotfix_version }}" >> "$GITHUB_OUTPUT"
          echo "Calculated version: ${{ github.event.inputs.hotfix_version }} (tag: v${{ github.event.inputs.hotfix_version }})"

      - name: Determine release type
        id: release-type
        run: |
          if [[ "${{ startsWith(github.ref_name, 'hotfix/') }}" == "true" ]]; then
            echo "release-type=hotfix" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "release-type=release" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "release-type=dev" >> "$GITHUB_OUTPUT"
          else
            echo "release-type=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate next version
        if: ${{ !startsWith(github.ref_name, 'hotfix/') }}
        id: calc-version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -m 1 -E '^v[0-9]+\.[0-9]+\.[0-9]+$')
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous release tag found. Starting from v0.0.0"
            LATEST_TAG="v0.0.0"
          fi
          echo "Highest release tag: $LATEST_TAG"

          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)

          RELEASE_TYPE="${{ steps.release-type.outputs.release-type }}"

          if [ "$RELEASE_TYPE" = "dev" ]; then
            # Dev builds always assume next minor version
            MINOR=$((MINOR + 1))
            NEXT_VERSION="${MAJOR}.${MINOR}.0-dev"
          else
            BUMP_TYPE="${{ needs.validate-input.outputs.version-bump }}"
            case "$BUMP_TYPE" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                ;;
            esac
            NEXT_VERSION="${MAJOR}.${MINOR}.0"
          fi

          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Calculated version: ${NEXT_VERSION} (release type: ${RELEASE_TYPE})"

      - name: Find previous release tag
        id: prev-tag
        run: |
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname --merged HEAD | grep -m 1 -E '^v[0-9]+\.[0-9]+\.[0-9]+$')
          echo "tag=${PREV_TAG:-}" >> "$GITHUB_OUTPUT"
          echo "Previous release tag: ${PREV_TAG:-none}"

  paths-filter:
    runs-on: ubuntu-24.04
    needs: validate-input
    outputs:
      changes-requiring-build: ${{ steps.paths-filter.outputs.changes-requiring-build }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Skip job when only certain files or file types are changed which do not require a pull request build
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: paths-filter
        with:
          # the field below incorrectly results in a schema validation. see: https://github.com/dorny/paths-filter/issues/225
          predicate-quantifier: 'every'
          # Please keep this list in sync with the one in the 'codeql.yml' workflow
          filters: |
            changes-requiring-build:
              - '**'
              - '!*.sh'
              - '!.github/CODEOWNERS'
              - '!**/*.md'
              - '!**/*.pdf'
              - '!**/*.png'
              - '!charts/**'
              - '!docs/**'
              - '!src/e2e/**'

  spotless-check:
    runs-on: ubuntu-24.04
    needs: [paths-filter]
    if: ${{ needs.paths-filter.outputs.changes-requiring-build != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
            java-version: ${{ env.JAVA_VERSION }}
            distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Spotless
        run: ./gradlew spotlessCheck

  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [paths-filter, validate-input]
    if: ${{ needs.paths-filter.outputs.changes-requiring-build == 'true' || github.ref == 'refs/heads/main' || startsWith(github.ref_name, 'hotfix/') }}
    outputs:
      branch_name: ${{ steps.gen_branch_name.outputs.BRANCH_NAME }}
      build_number: ${{ steps.gen_build_number.outputs.BUILD_NUMBER }}
      zac_docker_image: ${{ steps.gen_tag.outputs.ZAC_DOCKER_IMAGE }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set branch name
        id: gen_branch_name
        run: echo "BRANCH_NAME=${{ github.ref_name }}" | sed 's/\//_/g; s/(//g; s/)//g' >> $GITHUB_OUTPUT

      - name: Set build number
        id: gen_build_number
        run: echo "BUILD_NUMBER=${{ steps.gen_branch_name.outputs.BRANCH_NAME }}-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Set Docker image tag
        id: gen_tag
        run: echo "ZAC_DOCKER_IMAGE=${{ env.CONTAINER_REGISTRY_URL }}/${{ env.APPLICATION_NAME }}:${{ steps.gen_build_number.outputs.BUILD_NUMBER }}" >> $GITHUB_OUTPUT

      - name: Setup JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          # Use the Maven cache here so that Maven artefacts (Maven build is triggered from the Gradle build) are cached.
          cache: 'maven'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      # The Gradle build also executes a Maven command to build the WildFly bootable JAR.
      # Disable the Gradle Configuration Cache for now because we sometimes run into a similar issue to:
      # https://github.com/diffplug/spotless/issues/651
      - name: Gradle build
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ./gradlew clean build -x test --info --no-configuration-cache
          else
            ./gradlew build -x test --info --no-configuration-cache
          fi

      - name: Cache Gradle build artefacts
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            build
          key: build-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_number }}

      - name: Cache generated Java clients
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            src/generated
          key: generated-java-clients-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_number }}

      - name: Cache built frontend artefacts
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            src/main/app/dist/zaakafhandelcomponent
            src/main/app/src/generated/types
          key: built-frontend-artefacts-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_number }}

      - name: Cache built ZAC JAR
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target/zaakafhandelcomponent.jar
          key: zac-jar-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_number }}

  run-unit-tests:
    needs: [build, paths-filter]
    if: ${{ needs.paths-filter.outputs.changes-requiring-build == 'true' || github.ref == 'refs/heads/main' || startsWith(github.ref_name, 'hotfix/') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      READ_PACKAGES_USERNAME: $${{ vars.READ_PACKAGES_USERNAME }}
      READ_PACKAGES_TOKEN: ${{ secrets.READ_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Restore Gradle build artefacts
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            build
          key: build-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_number }}

      - name: Restore built frontend artefacts
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            build
          key: built-frontend-artefacts-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_number }}

      - name: Restore generated Java clients
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            src/generated
          key: generated-java-clients-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_number }}

      - name: Run unit tests when in merge queue
        if: ${{ github.event_name == 'merge_group' }}
        run: ./gradlew -x processResources -x classes test --info --rerun-tasks

      - name: Run unit tests and generate test coverage reports when not in merge queue
        if: ${{ github.event_name != 'merge_group' }}
        run: ./gradlew -x processResources -x classes test npmRunTestCoverage jacocoTestReport --info --rerun-tasks

      - name: Publish unit test results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: ${{ !cancelled() }}
        with:
          check_name: unit-test-results
          files: |
            build/test-results/test/**/*.xml
            src/main/app/reports/*.xml

      - name: Upload unit test results to CodeCov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: ${{ github.event_name != 'merge_group' && !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: "test_results"

      - name: Upload backend unit test coverage report to Codecov
        if: ${{ github.event_name != 'merge_group' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backendunittests
          directory: ./build/reports/jacoco/test

      - name: Upload frontend unit test coverage report to Codecov
        if: ${{ github.event_name != 'merge_group' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontendunittests
          directory: ./src/main/app/coverage

  build-docker-image-and-run-itests:
    needs: [build, paths-filter, determine-version]
    if: ${{ (github.event_name != 'merge_group' && needs.paths-filter.outputs.changes-requiring-build == 'true') || github.ref == 'refs/heads/main' || startsWith(github.ref_name, 'hotfix/') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      BUILD_NUMBER: ${{ needs.build.outputs.build_number }}
      BRANCH_NAME: ${{ needs.build.outputs.branch_name }}
      ZAC_DOCKER_IMAGE: ${{ needs.build.outputs.zac_docker_image }}
      GIT_COMMIT_HASH: ${{ github.sha }}
      BAG_API_CLIENT_MP_REST_URL: ${{ vars.BAG_API_CLIENT_MP_REST_URL }}
      BAG_API_KEY: ${{ secrets.BAG_API_KEY }}
      NEXT_VERSION: ${{ needs.determine-version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: authenticate with docker hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Restore built ZAC JAR
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target/zaakafhandelcomponent.jar
          key: zac-jar-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_number }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          tags: ${{ env.ZAC_DOCKER_IMAGE }}
          build-args: |
            versionNumber=${{ env.NEXT_VERSION }}
            branchName=${{ env.BRANCH_NAME }}
            commitHash=${{ env.GIT_COMMIT_HASH }}
          context: .
          load: true
          push: false
          # use GitHub Actions cache to speed up the build
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration tests with ZAC PABC integration feature flag disabled
        run: |
          ./gradlew -PzacDockerImage=${ZAC_DOCKER_IMAGE} \
            -PfeatureFlagPabcIntegration=false \
            -x compileJava -x processResources -x compileKotlin -x classes -x buildDockerImage \
            itest --info

      - name: Upload integration test results to CodeCov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: "test_results"

      - name: Publish integration test results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: ${{ !cancelled() }}
        with:
          check_name: integration-test-results
          files: |
            build/test-results/itest/**/*.xml

      - name: Delete integration test data
        run: |
          # Delete the integration test data to ensure that the next run starts with a clean slate
          # This is required because the integration tests use the same data sources and we do not want to
          # have leftover data from previous runs.
          sudo rm -rf ./scripts/docker-compose/volume-data

      - name: Run integration tests with ZAC PABC integration feature flag enabled
        run: |
          ./gradlew -PzacDockerImage=${ZAC_DOCKER_IMAGE} \
            -PfeatureFlagPabcIntegration=true \
            -x compileJava -x processResources -x compileKotlin -x classes -x buildDockerImage \
            itest --info

      - name: Upload integration test results to CodeCov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: "test_results"

      - name: Publish integration test results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: ${{ !cancelled() }}
        with:
          check_name: integration-test-results
          files: |
            build/test-results/itest/**/*.xml

      # JaCoCo requires our Java class files to be able to generate a report
      # so restore the Gradle build artefacts from the cache
      - name: Restore Gradle build artefacts
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            build
          key: build-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_number }}

      - name: Generate JaCoCo integration test code coverage report
        run: ./gradlew jacocoIntegrationTestReport -x itest --info

      - name: Upload integration test coverage report to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          flags: integrationtests
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Save Docker Image
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref_name, 'hotfix/') }}
        run: docker save --output docker-image.tar ${ZAC_DOCKER_IMAGE}

      - name: Cache ZAC Docker Image
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref_name, 'hotfix/') }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: docker-image.tar
          key: docker-image-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_number }}

  push-docker-image:
    needs: [build, run-unit-tests, build-docker-image-and-run-itests, determine-version]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # Avoid infinite build loop on renovate updates
    if: ${{ (github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'update ghcr.io/infonl/zaakafhandelcomponent docker tag') && !contains(github.event.head_commit.message, 'update dependency infonl/dimpact-zaakafhandelcomponent to')) || startsWith(github.ref_name, 'hotfix/') }}
    env:
      ZAC_DOCKER_IMAGE: ${{ needs.build.outputs.zac_docker_image }}
      NEXT_VERSION: ${{ needs.determine-version.outputs.version }}
      RELEASE_TYPE: ${{ needs.determine-version.outputs.release-type }}
    steps:
      - name: Docker Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.CONTAINER_REGISTRY_URL }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Docker Image
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: docker-image.tar
          key: docker-image-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_number }}

      - name: Load Docker Image
        run: docker load --input docker-image.tar

      - name: Tag Docker Image with 'latest' tag
        if: github.ref == 'refs/heads/main'
        run: docker tag ${ZAC_DOCKER_IMAGE} ${CONTAINER_REGISTRY_URL}/${APPLICATION_NAME}:latest

      - name: Tag Docker Image with version tag
        if: env.NEXT_VERSION != ''
        run: docker tag ${ZAC_DOCKER_IMAGE} ${CONTAINER_REGISTRY_URL}/${APPLICATION_NAME}:${NEXT_VERSION}

      - name: Tag Docker Image with pinned dev build number tag
        if: ${{ env.RELEASE_TYPE == 'dev' }}
        run: docker tag ${ZAC_DOCKER_IMAGE} ${CONTAINER_REGISTRY_URL}/${APPLICATION_NAME}:${NEXT_VERSION}.${{ github.run_number }}

      - name: Tag Docker Image with major and minor version tags
        if: ${{ env.NEXT_VERSION != '' && env.RELEASE_TYPE == 'release' }}
        run: |
          MAJOR_VERSION=$(echo ${NEXT_VERSION} | cut -d '.' -f 1)
          MINOR_VERSION=$(echo ${NEXT_VERSION} | cut -d '.' -f 2)
          docker tag ${ZAC_DOCKER_IMAGE} ${CONTAINER_REGISTRY_URL}/${APPLICATION_NAME}:${MAJOR_VERSION}
          docker tag ${ZAC_DOCKER_IMAGE} ${CONTAINER_REGISTRY_URL}/${APPLICATION_NAME}:${MAJOR_VERSION}.${MINOR_VERSION}

      - name: Push Docker Image with all tags
        run: docker push --all-tags ${CONTAINER_REGISTRY_URL}/${APPLICATION_NAME}

  create-release:
    needs: [push-docker-image, determine-version]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref_name, 'hotfix/')
    runs-on: ubuntu-24.04
    env:
      NEXT_VERSION: ${{ needs.determine-version.outputs.version }}
      NEXT_VERSION_TAG: ${{ needs.determine-version.outputs.tag }}
      RELEASE_TYPE: ${{ needs.determine-version.outputs.release-type }}
      PREVIOUS_TAG: ${{ needs.determine-version.outputs.previous-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Delete existing dev pre-releases
        if: ${{ env.RELEASE_TYPE == 'dev' || env.RELEASE_TYPE == 'release' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dev_tags=$(gh release list --json tagName,isPrerelease -q '[.[] | select(.isPrerelease and (.tagName | endswith("-dev")))] | .[].tagName' 2>/dev/null || echo "")
          for tag in $dev_tags; do
            echo "Deleting dev pre-release: $tag"
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          done

      - name: Read dependencies
        id: dependencies
        run: |
          echo "dependencies<<EOF" >> $GITHUB_OUTPUT
          cat DEPENDENCIES.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release-notes
        if: ${{ env.PREVIOUS_TAG != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ env.NEXT_VERSION_TAG }}" \
            -f target_commitish="${{ github.sha }}" \
            -f previous_tag_name="${{ env.PREVIOUS_TAG }}" \
            --jq '.body' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create dev pre-release
        if: ${{ env.RELEASE_TYPE == 'dev' }}
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.NEXT_VERSION_TAG }}
          commit: ${{ github.sha }}
          name: ${{ env.APPLICATION_NAME }} ${{ env.NEXT_VERSION }} (development build)
          body: |
            ⚠️ **This is a development pre-release and is updated with every push to main.**

            Docker image: `${{ env.CONTAINER_REGISTRY_URL }}/${{ env.APPLICATION_NAME }}:${{ env.NEXT_VERSION }}`
            Build: #${{ github.run_number }} | Commit: `${{ github.sha }}`

            ## Tested Against

            ${{ steps.dependencies.outputs.dependencies }}

            ${{ steps.release-notes.outputs.notes }}
          draft: false
          prerelease: true
          makeLatest: false
          allowUpdates: true
          updateOnlyUnreleased: true

      - name: Create release
        if: ${{ env.RELEASE_TYPE == 'release' || env.RELEASE_TYPE == 'hotfix' }}
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.NEXT_VERSION_TAG }}
          commit: ${{ github.sha }}
          name: ${{ env.APPLICATION_NAME }} ${{ env.NEXT_VERSION }}
          body: |
            This release contains the docker image ${{ env.APPLICATION_NAME }} ${{ env.NEXT_VERSION }}, which is available
            at ${{ env.CONTAINER_REGISTRY_URL }}/${{ env.APPLICATION_NAME }}:${{ env.NEXT_VERSION }}

            ## Tested Against

            ${{ steps.dependencies.outputs.dependencies }}

            ${{ steps.release-notes.outputs.notes }}
          draft: false
          prerelease: false
          allowUpdates: true
          makeLatest: ${{ env.RELEASE_TYPE == 'release' }}

  trigger-provision:
    needs: [determine-version, push-docker-image, create-release]
    env:
      PROVISION_TAG: ${{ needs.determine-version.outputs.release-type == 'dev' && format('{0}.{1}', needs.determine-version.outputs.version, github.run_number) || needs.determine-version.outputs.version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: ${{ github.ref == 'refs/heads/main' && vars.ENABLE_AUTOMATIC_PROVISION == 'true' }}
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.PROVISION_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'infonl',
              repo: 'dimpact-provisioning',
              workflow_id: 'azure-provision-zaakafhandelcomponent.yml',
              inputs: {
                tag: '${{ env.PROVISION_TAG }}',
                commit_sha: '${{ github.sha }}',
              },
              ref: 'main'
            })
