name: Dependency Security Scan

on:
  schedule:
    # Run daily at 6 AM UTC to catch newly discovered vulnerabilities
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  issues: write
  pull-requests: write
  pages: write
  packages: read

env:
  JAVA_VERSION: "25.0.3"
  SECURITY_SCAN_RETENTION_DAYS: 30 # Maximum age of security scan reports in days
  # Pre-built OWASP Dependency-Check NVD database, published by the
  # "Publish NVD Database Cache" workflow. Consuming it here avoids downloading
  # from the rate-limited NVD API on every scan.
  NVD_DATABASE_CACHE_IMAGE: ghcr.io/infonl/nvd-database-cache
  # Maximum age (in days) of the published NVD database before the scan fails
  # rather than silently scanning against stale vulnerability data.
  NVD_DATABASE_MAX_AGE_DAYS: 3

jobs:
  npm-security-audit:
    name: NPM Security Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      vuln_total: ${{ steps.audit_main.outputs.vuln_total }}
      vuln_critical: ${{ steps.audit_main.outputs.vuln_critical }}
      vuln_high: ${{ steps.audit_main.outputs.vuln_high }}

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 2 # Need previous commit to detect changes

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: "npm"
          cache-dependency-path: src/main/app/package-lock.json

      - name: Audit main app dependencies
        id: audit_main
        continue-on-error: true
        working-directory: src/main/app
        run: |
          echo "🔍 Running security audit for main application..."
          npm ci --ignore-scripts

          npm audit --json > audit-results.json || true

          # Convert to SARIF format
          jq -f "${{ github.workspace }}/scripts/github/helpers/npm-audit-to-sarif.jq" audit-results.json > npm-audit-main.sarif

          # Extract vulnerability counts from JSON
          TOTAL=$(jq '[.vulnerabilities | to_entries[] | select(.value.via | type == "array" and (map(type == "object") | any))] | length' audit-results.json)
          CRITICAL=$(jq '[.vulnerabilities | to_entries[] | select(.value.severity == "critical")] | length' audit-results.json)
          HIGH=$(jq '[.vulnerabilities | to_entries[] | select(.value.severity == "high")] | length' audit-results.json)
          MODERATE=$(jq '[.vulnerabilities | to_entries[] | select(.value.severity == "moderate")] | length' audit-results.json)
          LOW=$(jq '[.vulnerabilities | to_entries[] | select(.value.severity == "low")] | length' audit-results.json)

          echo "vuln_total=$TOTAL" >> $GITHUB_OUTPUT
          echo "vuln_critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "vuln_high=$HIGH" >> $GITHUB_OUTPUT
          echo "vuln_moderate=$MODERATE" >> $GITHUB_OUTPUT
          echo "vuln_low=$LOW" >> $GITHUB_OUTPUT

          # Display summary
          echo "📊 Vulnerability Summary:"
          echo "  Critical: $CRITICAL"
          echo "  High: $HIGH"
          echo "  Moderate: $MODERATE"
          echo "  Low: $LOW"
          echo "  Total: $TOTAL"

          # Fail if high or critical vulnerabilities found
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "🚨 Found $CRITICAL critical and $HIGH high severity vulnerabilities!"
            exit 1
          fi

      - name: Generate npm audit summary
        if: always()
        run: |
          echo "## 📦 NPM Security Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Main Application" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | ${{ steps.audit_main.outputs.vuln_critical || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | ${{ steps.audit_main.outputs.vuln_high || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Moderate | ${{ steps.audit_main.outputs.vuln_moderate || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟢 Low | ${{ steps.audit_main.outputs.vuln_low || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **${{ steps.audit_main.outputs.vuln_total || 0 }}** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "🔒 [Security Tab](${{ github.server_url }}/${{ github.repository }}/security/code-scanning)" >> $GITHUB_STEP_SUMMARY

      - name: Upload npm audit SARIF results (main app)
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        if: always() && hashFiles('src/main/app/npm-audit-main.sarif') != ''
        with:
          sarif_file: src/main/app/npm-audit-main.sarif
          category: npm-audit-main-app

  gradle-security-audit:
    name: Gradle Security Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      vuln_total: ${{ steps.owasp_scan.outputs.vuln_total }}
      vuln_critical: ${{ steps.owasp_scan.outputs.vuln_critical }}
      vuln_high: ${{ steps.owasp_scan.outputs.vuln_high }}
      scan_date: ${{ steps.date.outputs.date }}
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and extract the pre-built NVD database
        run: |
          # The NVD database is maintained centrally by the "Publish NVD Database
          # Cache" workflow and shipped as a GHCR image, so this scan never
          # downloads from the rate-limited NVD API itself. dependencyCheckAnalyze
          # runs with autoUpdate=false (see build.gradle.kts) against the database
          # extracted here.
          mkdir -p ~/.gradle/dependency-check-data
          if ! docker pull "${NVD_DATABASE_CACHE_IMAGE}:latest"; then
            echo "::error::Could not pull ${NVD_DATABASE_CACHE_IMAGE}:latest. Run the 'Publish NVD Database Cache' workflow (with seed_database=true on first use) to build it."
            exit 1
          fi
          container_id=$(docker create "${NVD_DATABASE_CACHE_IMAGE}:latest")
          cleanup() { docker rm -f "${container_id}" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker cp "${container_id}:/dependency-check-data/." ~/.gradle/dependency-check-data/
          docker cp "${container_id}:/nvd-build-metadata.txt" ./nvd-build-metadata.txt
          cleanup
          trap - EXIT
          # Locate the H2 database with `find` rather than a fixed-depth glob:
          # because build.gradle.kts overrides data.directory, odc.mv.db sits
          # directly in that directory (not in a version subdirectory), so a
          # `*/odc.mv.db` glob would miss it.
          database_file=$(find ~/.gradle/dependency-check-data -name odc.mv.db -type f 2>/dev/null | head -1 || true)
          if [ -z "${database_file}" ]; then
            echo "::error::The pulled image did not contain an NVD database."
            exit 1
          fi
          echo "✅ Extracted NVD database ($(du -m "${database_file}" | cut -f1) MB)."

      - name: Verify the NVD database is fresh and complete
        # Make staleness impossible to miss: the scan fails (and the failure is
        # reported to Slack by the notify-slack job) if the published database is
        # incomplete or older than NVD_DATABASE_MAX_AGE_DAYS, rather than silently
        # scanning against out-of-date vulnerability data.
        run: |
          if [ ! -f nvd-build-metadata.txt ]; then
            echo "::error::NVD database image has no freshness metadata; refusing to scan against an unknown database."
            exit 1
          fi
          cat nvd-build-metadata.txt
          # The default GitHub Actions bash shell runs with `-eo pipefail`, so a
          # `grep` that finds no match exits 1 and would abort this step before the
          # explicit error handling below. Tolerate a missing key with `|| true`
          # and validate the values ourselves so we fail with the intended message.
          status=$(grep '^status=' nvd-build-metadata.txt | cut -d= -f2 || true)
          updated_at=$(grep '^updated_at=' nvd-build-metadata.txt | cut -d= -f2 || true)
          if [ "${status}" != "complete" ]; then
            echo "::error::NVD database is not complete (status=${status:-unknown}). The 'Publish NVD Database Cache' workflow has not yet built a full database."
            exit 1
          fi
          if [ -z "${updated_at}" ]; then
            echo "::error::NVD database has no update timestamp; refusing to scan."
            exit 1
          fi
          # Parse the timestamp explicitly so a malformed value fails with our
          # error message instead of aborting the step inside the arithmetic below.
          updated_at_epoch=$(date -u -d "${updated_at}" +%s 2>/dev/null || true)
          if [ -z "${updated_at_epoch}" ]; then
            echo "::error::NVD database update timestamp '${updated_at}' is not a valid date; refusing to scan."
            exit 1
          fi
          age_days=$(( ( $(date -u +%s) - updated_at_epoch ) / 86400 ))
          echo "NVD database last updated: ${updated_at} (${age_days} day(s) ago)"
          if [ "${age_days}" -gt "${NVD_DATABASE_MAX_AGE_DAYS}" ]; then
            echo "::error::NVD database is ${age_days} days old (max ${NVD_DATABASE_MAX_AGE_DAYS}). The 'Publish NVD Database Cache' workflow is likely failing - scan results would be based on stale data."
            exit 1
          fi
          echo "✅ NVD database is complete and fresh."

      - name: Check for vulnerable Gradle dependencies
        id: owasp_scan
        continue-on-error: true
        run: |
          echo "🛡️ Running OWASP Dependency Check..."
          # autoUpdate=false (build.gradle.kts) means analyze uses the extracted
          # database and never contacts the NVD API.
          ./gradlew dependencyCheckAnalyze --no-configuration-cache --info 2>&1 | tee owasp-scan.log || true

          # Show SARIF file info if generated
          if [ -f "build/reports/dependency-check-report.sarif" ]; then
            echo "✅ SARIF report generated for GitHub Security upload"
            wc -l build/reports/dependency-check-report.sarif
            
            # Post-process SARIF to normalize tool name for consistency with NPM Audit
            jq '.runs[0].tool.driver.name = "OWASP Dependency Check"' \
              build/reports/dependency-check-report.sarif > build/reports/dependency-check-report-processed.sarif
            mv build/reports/dependency-check-report-processed.sarif build/reports/dependency-check-report.sarif
            echo "✅ SARIF post-processing complete"
          else
            echo "❌ SARIF report not found"
          fi

          # Save vulnerability counts for Slack notification
          if [ -f "build/reports/dependency-check-report.json" ]; then
            TOTAL_VULNS=$(jq '[.dependencies[]?.vulnerabilities[]?] | length' build/reports/dependency-check-report.json 2>/dev/null || echo "0")
            CRITICAL_VULNS=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="CRITICAL")] | length' build/reports/dependency-check-report.json 2>/dev/null || echo "0")
            HIGH_VULNS=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="HIGH")] | length' build/reports/dependency-check-report.json 2>/dev/null || echo "0")
            echo "vuln_total=$TOTAL_VULNS" >> $GITHUB_OUTPUT
            echo "vuln_critical=$CRITICAL_VULNS" >> $GITHUB_OUTPUT
            echo "vuln_high=$HIGH_VULNS" >> $GITHUB_OUTPUT
          fi
      - name: Generate vulnerability summary
        if: always()
        run: |
          echo "📊 Generating vulnerability summary..."

          # Parse OWASP scan results
          TOTAL_VULNS=0
          CRITICAL_VULNS=0
          HIGH_VULNS=0
          MEDIUM_VULNS=0
          LOW_VULNS=0

          if [ -f "build/reports/dependency-check-report.json" ]; then
            # Extract vulnerability counts from JSON report
            TOTAL_VULNS=$(jq '[.dependencies[]?.vulnerabilities[]?] | length' build/reports/dependency-check-report.json 2>/dev/null || echo "0")
            CRITICAL_VULNS=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="CRITICAL")] | length' build/reports/dependency-check-report.json 2>/dev/null || echo "0")
            HIGH_VULNS=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="HIGH")] | length' build/reports/dependency-check-report.json 2>/dev/null || echo "0")
            MEDIUM_VULNS=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="MEDIUM")] | length' build/reports/dependency-check-report.json 2>/dev/null || echo "0")
            LOW_VULNS=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="LOW")] | length' build/reports/dependency-check-report.json 2>/dev/null || echo "0")
          fi

          # Write summary to GitHub Step Summary
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## 🛡️ OWASP Dependency Check Results

          ### Vulnerability Summary

          | Severity | Count |
          |----------|-------|
          | 🔴 Critical | $CRITICAL_VULNS |
          | 🟠 High | $HIGH_VULNS |
          | 🟡 Medium | $MEDIUM_VULNS |
          | 🟢 Low | $LOW_VULNS |
          | **Total** | **$TOTAL_VULNS** |

          📊 [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          🔒 [Security Tab](${{ github.server_url }}/${{ github.repository }}/security/code-scanning)

          EOF

      - name: Upload SARIF results to GitHub Security
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        if: always() && hashFiles('build/reports/dependency-check-report.sarif') != ''
        with:
          sarif_file: build/reports/dependency-check-report.sarif
          category: owasp-dependency-check

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-24.04
    needs: [npm-security-audit, gradle-security-audit]
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Determine status
        id: status
        run: |
          # Determine overall status based on job results
          NPM_STATUS="${{ needs.npm-security-audit.result }}"
          GRADLE_STATUS="${{ needs.gradle-security-audit.result }}"

          if [[ "$NPM_STATUS" == "failure" || "$GRADLE_STATUS" == "failure" ]]; then
            echo "status=Failed" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          elif [[ "$NPM_STATUS" == "success" && "$GRADLE_STATUS" == "success" ]]; then
            echo "status=Passed" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=Completed with warnings" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":shield: Supply Chain Security Scan Complete",
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Status:* ${{ steps.status.outputs.status }} ${{ steps.status.outputs.emoji }}\n*Repository:* ${{ github.repository }}\n\n*NPM Vulnerabilities:*\n• Critical: ${{ needs.npm-security-audit.outputs.vuln_critical || 0 }}\n• High: ${{ needs.npm-security-audit.outputs.vuln_high || 0 }}\n• Total: ${{ needs.npm-security-audit.outputs.vuln_total || 0 }}\n\n*Gradle Vulnerabilities:*\n• Critical: ${{ needs.gradle-security-audit.outputs.vuln_critical || 0 }}\n• High: ${{ needs.gradle-security-audit.outputs.vuln_high || 0 }}\n• Total: ${{ needs.gradle-security-audit.outputs.vuln_total || 0 }}"
                      }
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "🔒 Security Tab"
                          },
                          "url": "${{ github.server_url }}/${{ github.repository }}/security/code-scanning"
                        },
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "⚙️ Workflow"
                          },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
