    profiles: [ "metrics" ]

  greenmail:
    image: greenmail/standalone:2.1.8@sha256:d556b8c7df01ba04a0e0f67dacab2c5f75a61207a51774e0654c179b83a671e1
    environment:
      GREENMAIL_OPTS: >-
        -Dgreenmail.smtp.hostname=0.0.0.0
        -Dgreenmail.smtp.port=25
        -Dgreenmail.hostname=0.0.0.0
        -Dgreenmail.auth.disabled
        -Dgreenmail.verbose
    ports:
      - "25:25"
      - "143:143"
      - "18083:8080"
    profiles: [ "itest" ]

  rabbitmq:
    # note: RabbitMQ 4.3.0 breaks Open Notificaties 1.13.0
    image: rabbitmq:4.3.1-alpine@sha256:864c7f33ec3ff066de8c66ab337f39258d00f8680f1ef3f14138be788463ca9f
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 20
    profiles: [ "opennotificaties", "openformulieren" ]

  opennotificaties-database:
    image: postgis/postgis:17-3.4@sha256:d0b5a6ecab18997637f55a83cb4a9467391de5645916cfa1b6f2a8d19eee7be5
    # No image for linux/arm64 is available, so we need to run this image with the linux/amd64 platform on Apple Silicon devices using emulation.
    platform: linux/amd64
    ports:
      - "54327:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 10s
      retries: 20
    environment:
      - POSTGRES_USER=opennotificaties
      - POSTGRES_PASSWORD=opennotificaties
      - POSTGRES_DB=opennotificaties
    command: postgres -c max_connections=300 -c log_min_messages=LOG
    volumes:
      - ./scripts/docker-compose/imports/opennotificaties-database:/docker-entrypoint-initdb.d
      - ./scripts/docker-compose/volume-data/opennotificaties-database-data:/var/lib/postgresql/data
    profiles: [ "opennotificaties", "openformulieren" ]

  opennotificaties:
    image: openzaak/open-notificaties:1.14.0@sha256:fbd0aaaaa8a6e5395510c4d0a28501425b7f9036ece7f99ff70a4465d7d95c38
    # No image for linux/arm64 is available, so we need to run this image with the linux/amd64 platform on Apple Silicon devices using emulation.
    platform: linux/amd64
    environment: &opennotificaties-env
      ALLOWED_HOSTS: "*"
      CACHE_DEFAULT: redis:6379/0
      CACHE_AXES: redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_LOGLEVEL: DEBUG
      DB_HOST: opennotificaties-database
      DB_NAME: opennotificaties
      DB_PASSWORD: opennotificaties
      DB_USER: opennotificaties
      DEBUG: true
      DISABLE_2FA: true
      DJANGO_SETTINGS_MODULE: nrc.conf.docker
      DJANGO_SUPERUSER_PASSWORD: admin
      LOG_LEVEL: DEBUG
      LOG_NOTIFICATIONS_IN_DB: true
      OPENNOTIFICATIES_SUPERUSER_USERNAME: admin
      OPENNOTIFICATIES_SUPERUSER_EMAIL: admin@example.com
      PUBLISH_BROKER_URL: amqp://guest:guest@rabbitmq:5672/%2F
      RABBITMQ_HOST: rabbitmq
      SECRET_KEY: opennotificatiesApiSecretKey
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; exit(requests.head('http://localhost:8000/admin/').status_code not in [200, 302])" ]
      interval: 5s
      timeout: 10s
      retries: 10
      # This should allow for enough time for migrations to run before the max
      # retries have passed.
      # This health check in turn allows other containers to wait for the database migrations.
      start_period: 10s
    ports:
      - "8003:8000"
    volumes: &opennotificaties-volumes
      - ./scripts/docker-compose/imports/opennotificaties/setup-configuration:/app/setup_configuration
    depends_on:
      opennotificaties-init:
        condition: service_completed_successfully
    profiles: [ "opennotificaties", "openformulieren" ]

  opennotificaties-init:
    image: openzaak/open-notificaties:1.14.0@sha256:fbd0aaaaa8a6e5395510c4d0a28501425b7f9036ece7f99ff70a4465d7d95c38
    # No image for linux/arm64 is available, so we need to run this image with the linux/amd64 platform on Apple Silicon devices using emulation.
    platform: linux/amd64
    environment:
      <<: *opennotificaties-env
      # Run Django setup configuration
      RUN_SETUP_CONFIG: ${RUN_SETUP_CONFIG:-true}
    command: /setup_configuration.sh
    depends_on:
      opennotificaties-database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    volumes: *opennotificaties-volumes
    profiles: [ "opennotificaties", "openformulieren" ]

  opennotificaties-celery:
    image: openzaak/open-notificaties:1.14.0@sha256:fbd0aaaaa8a6e5395510c4d0a28501425b7f9036ece7f99ff70a4465d7d95c38
    # No image for linux/arm64 is available, so we need to run this image with the linux/amd64 platform on Apple Silicon devices using emulation.
    platform: linux/amd64
    environment: *opennotificaties-env
    command: /celery_worker.sh
    healthcheck:
      test: [ "CMD", "python", "/app/bin/check_celery_worker_liveness.py" ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    depends_on:
      opennotificaties:
        condition: service_healthy
    profiles: [ "opennotificaties", "openformulieren" ]

