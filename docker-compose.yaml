  objecttypes-api-import:
    image: maykinmedia/objecttypes-api:3.4.2@sha256:d366e6ede1bb924ea351495f4e88ceba53bb0df02fa5302929daef379131fda1
    platform: linux/amd64
    environment: *objecttypes-env
    command: sh init/init.sh
    volumes:
      - ./scripts/docker-compose/imports/objecttypes-api/fixtures:/app/src/objecttypes/fixtures
      - ./scripts/docker-compose/imports/objecttypes-api/init:/app/init
    depends_on:
      - objecttypes-api
    profiles: [ "openformulieren" ]

  openformulieren-database:
    image: postgres:17.10@sha256:0027bef26712baaee437a4ea48fdf3d2d2e2bc5f0d81615374408ca320f3c7e3
    ports:
      - "54330:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 10s
      retries: 20
    environment:
      - POSTGRES_USER=openformulieren
      - POSTGRES_PASSWORD=openformulieren
      - POSTGRES_DB=openformulieren
    volumes:
      - ./scripts/docker-compose/volume-data/openformulieren-database-data:/var/lib/postgresql/data
    profiles: [ "openformulieren" ]

  openformulieren-init:
    image: openformulieren/open-forms:3.4.2@sha256:70574342ab610792478b38e73eecf23d5f9d91a571e48a7a9327ea6e7008bcec
    # for now we set the platform to AMD because using the current Open Formulieren INFO.nl custom-built ARM Docker Image
    # results in a non-working Open Formulieren instance.
    # using the INFO.nl Open Formulieren ARM image, when you create a new form and attempt to open it, you will see this error in the browser
    # "Er ging helaas iets fout. Neem a.u.b. contact op met de helpdesk en informeer hen van dit probleem."
    # This seems to have to do with missing static content (such as JS translation bundles) in the ARM image.
    # You will see a related 404 error on a JS translation bundle file in the browser when trying to open a form.
    platform: linux/amd64
    environment: &openformulieren-env
      - DJANGO_SETTINGS_MODULE=openforms.conf.docker_local
      - SECRET_KEY=openFormulierenSecretKey
      - DB_NAME=openformulieren
      - DB_USER=openformulieren
      - DB_PASSWORD=openformulieren
      - DB_HOST=openformulieren-database
      - CACHE_DEFAULT=redis:6379/2
      - CACHE_AXES=redis:6379/2
      - CACHE_PORTALOCKER=redis:6379/2
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ALLOWED_HOSTS=*
      - CORS_ALLOW_ALL_ORIGINS=true
      - CSRF_TRUSTED_ORIGINS=http://localhost:8007,http://localhost:8009
      - USE_X_FORWARDED_HOST=true
      - EMAIL_HOST=localhost
      - TZ=Europe/Amsterdam
      - DISABLE_2FA=true
      - DJANGO_SUPERUSER_PASSWORD=admin
      - RUN_SETUP_CONFIG=true
      - DEBUG=true
      - OTEL_SDK_DISABLED=true
    command:
      - sh
      - -c
      - |
        set -e
        /setup_configuration.sh
        OTEL_SDK_DISABLED=True src/manage.py shell -c "
        from django.contrib.auth import get_user_model
        User = get_user_model()
        if not User.objects.filter(username='admin').exists():
            User.objects.create_superuser('admin', 'admin@example.com', 'admin')
            print('Admin user created')
        else:
            print('Admin user already exists')
        "
        OTEL_SDK_DISABLED=True src/manage.py shell -c "
        try:
            from openforms.contrib.haal_centraal.models import HaalCentraalConfig
            from zgw_consumers.models import Service
            config = HaalCentraalConfig.get_solo()
            if not config.brp_personen_service_id:
                svc = Service.objects.get(slug='brp-personen')
                config.brp_personen_service = svc
                config.save()
                print('BRP service configured')
            else:
                print('BRP service already configured')
        except Exception as e:
            print(f'BRP config skipped: {e}')
        "
        OTEL_SDK_DISABLED=True src/manage.py shell -c "
        try:
            from openforms.contrib.customer_interactions.models import CustomerInteractionsAPIGroupConfig
            from zgw_consumers.models import Service
            IDENTIFIER = 'klantinteracties-api-group'
            if not CustomerInteractionsAPIGroupConfig.objects.filter(identifier=IDENTIFIER).exists():
                svc = Service.objects.get(slug='openklant-klantinteracties')
                CustomerInteractionsAPIGroupConfig.objects.create(
                    name='Local Klantinteracties API',
                    identifier=IDENTIFIER,
                    customer_interactions_service=svc,
                )
                print('Klantinteracties API group configured')
            else:
                print('Klantinteracties API group already exists')
        except Exception as e:
            print(f'Klantinteracties config skipped: {e}')
        "
        OTEL_SDK_DISABLED=True src/manage.py shell -c "
        from openforms.forms.models import Form
        FORM_SLUG = 'productaanvraag-dimpact-test-formulier-compleet'
        if not Form.objects.filter(slug=FORM_SLUG).exists():
            import subprocess, sys, os, glob, zipfile
            json_files = glob.glob('/forms/*.json')
            with zipfile.ZipFile('/tmp/forms.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
                for f in json_files:
                    zf.write(f, os.path.basename(f))
            result = subprocess.run(
                [sys.executable, '/app/src/manage.py', 'import', '--import-file', '/tmp/forms.zip'],
                capture_output=True, text=True
            )
            print(result.stdout)
            if result.returncode != 0:
                print(result.stderr)
                sys.exit(result.returncode)
            print('Productaanvraag-Dimpact form imported successfully')
        form = Form.objects.get(slug=FORM_SLUG)
        if not form.active:
            form.active = True
            form.save(update_fields=['active'])
            print('Productaanvraag-Dimpact form activated')
        else:
            print('Productaanvraag-Dimpact form already active, skipping import')
        "
    volumes: &openformulieren-volumes
      - openformulieren-static:/srv/static
      - openformulieren-media:/app/media
      - openformulieren-private-media:/app/private_media
      - openformulieren-log:/app/log
      - ./scripts/docker-compose/imports/openformulieren/setup-configuration:/app/setup_configuration
      - ./scripts/docker-compose/imports/openformulieren/settings/docker_local.py:/app/src/openforms/conf/docker_local.py:ro
      - ./scripts/docker-compose/imports/openformulieren/forms:/forms:ro
    depends_on:
      openformulieren-database:
        condition: service_healthy
      redis:
        condition: service_started
      objecttypes-api:
        condition: service_started
    profiles: [ "openformulieren" ]

  openformulieren-web:
    image: openformulieren/open-forms:3.4.2@sha256:70574342ab610792478b38e73eecf23d5f9d91a571e48a7a9327ea6e7008bcec
    # for now we set the platform to AMD because using the current Open Formulieren INFO.nl custom-built ARM Docker Image
    # results in a non-working Open Formulieren instance.
    # using the INFO.nl Open Formulieren ARM image, when you create a new form and attempt to open it, you will see this error in the browser
    # "Er ging helaas iets fout. Neem a.u.b. contact op met de helpdesk en informeer hen van dit probleem."
    # This seems to have to do with missing static content (such as JS translation bundles) in the ARM image.
    # You will see a related 404 error on a JS translation bundle file in the browser when trying to open a form.
    platform: linux/amd64
    environment: *openformulieren-env
    ports:
      - "8009:8000"
    volumes: *openformulieren-volumes
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; exit(requests.head('http://localhost:8000/admin/').status_code not in [200, 302])" ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s
    depends_on:
      openformulieren-database:
        condition: service_healthy
      redis:
        condition: service_started
      openformulieren-init:
        condition: service_completed_successfully
    profiles: [ "openformulieren" ]

  openformulieren-celery:
    image: openformulieren/open-forms:3.4.2@sha256:70574342ab610792478b38e73eecf23d5f9d91a571e48a7a9327ea6e7008bcec
    # for now we set the platform to AMD because using the current Open Formulieren INFO.nl custom-built ARM Docker Image
    # results in a non-working Open Formulieren instance.
    # using the INFO.nl Open Formulieren ARM image, when you create a new form and attempt to open it, you will see this error in the browser
    # "Er ging helaas iets fout. Neem a.u.b. contact op met de helpdesk en informeer hen van dit probleem."
    # This seems to have to do with missing static content (such as JS translation bundles) in the ARM image.
    # You will see a related 404 error on a JS translation bundle file in the browser when trying to open a form.
    platform: linux/amd64
    environment: *openformulieren-env
    command: /celery_worker.sh
    healthcheck:
      test: [ "CMD", "python", "/app/bin/check_celery_worker_liveness.py" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - openformulieren-media:/app/media
      - openformulieren-private-media:/app/private_media
      - openformulieren-log:/app/log
      - ./scripts/docker-compose/imports/openformulieren/settings/docker_local.py:/app/src/openforms/conf/docker_local.py:ro
    depends_on:
      openformulieren-database:
        condition: service_healthy
      redis:
        condition: service_started
    profiles: [ "openformulieren" ]

  openformulieren-celery-beat:
    image: openformulieren/open-forms:3.4.2@sha256:70574342ab610792478b38e73eecf23d5f9d91a571e48a7a9327ea6e7008bcec
    # for now we set the platform to AMD because using the current Open Formulieren INFO.nl custom-built ARM Docker Image
    # results in a non-working Open Formulieren instance.
    # using the INFO.nl Open Formulieren ARM image, when you create a new form and attempt to open it, you will see this error in the browser
    # "Er ging helaas iets fout. Neem a.u.b. contact op met de helpdesk en informeer hen van dit probleem."
    # This seems to have to do with missing static content (such as JS translation bundles) in the ARM image.
    # You will see a related 404 error on a JS translation bundle file in the browser when trying to open a form.
    platform: linux/amd64
    environment: *openformulieren-env
    command: /celery_beat.sh
    volumes:
      - openformulieren-media:/app/media
      - openformulieren-private-media:/app/private_media
      - openformulieren-log:/app/log
      - ./scripts/docker-compose/imports/openformulieren/settings/docker_local.py:/app/src/openforms/conf/docker_local.py:ro
    depends_on:
      openformulieren-database:
        condition: service_healthy
      redis:
        condition: service_started
    profiles: [ "openformulieren" ]

  openformulieren-nginx:
    image: nginxinc/nginx-unprivileged:1.31.1@sha256:9f6b32064a29d747404d959e078c713a0523a9bd4e41f6912058126ebca94e61
    ports:
      - "8007:8080"
    volumes:
      - ./scripts/docker-compose/imports/openformulieren/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      openformulieren-web:
        condition: service_healthy
    profiles: [ "openformulieren" ]

volumes:
  openformulieren-static:
  openformulieren-media:
  openformulieren-private-media:
  openformulieren-log:
