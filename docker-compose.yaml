  pabc-database:
    image: postgres:17.10@sha256:0027bef26712baaee437a4ea48fdf3d2d2e2bc5f0d81615374408ca320f3c7e3
    ports:
      - "54329:5432"
    environment:
      - POSTGRES_USER=pabc
      - POSTGRES_PASSWORD=pabc
      - POSTGRES_DB=Pabc
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 10s
      retries: 10
    volumes:
      - ./scripts/docker-compose/volume-data/pabc-database-data:/var/lib/postgresql/data

  pabc-migrations:
    image: ghcr.io/platform-autorisatie-beheer-component/pabc-migrations:1.1.0@sha256:c40905205d997936538bbe1efdf0c582ec98a8414df9ceb05b0c1b0d1121a39a
    # No image for linux/arm64 is available, so we need to run this image with the linux/amd64 platform on Apple Silicon devices using emulation.
    platform: linux/amd64
    environment:
      ConnectionStrings__Pabc: "Host=pabc-database;Port=5432;Username=pabc;Password=pabc;Database=Pabc"
      JSON_DATASET_PATH: "/app/json/pabc-mapping-data.json"
    depends_on:
      pabc-database:
        condition: "service_healthy"
    volumes:
      - ./scripts/docker-compose/imports/pabc-database/json-mapping/pabc-mapping-data.json:/app/json/pabc-mapping-data.json:ro

  pabc-api:
    image: ghcr.io/platform-autorisatie-beheer-component/pabc-api:1.1.0@sha256:108225d8ba671ace5be159d24ecfdfe06b073494227943a123955418c5b124a0
    # No image for linux/arm64 is available, so we need to run this image with the linux/amd64 platform on Apple Silicon devices using emulation.
    platform: linux/amd64
    environment:
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8000"
      API_KEY__0: "zac-test-api-key"
      ConnectionStrings__Pabc: "Host=pabc-database;Port=5432;Username=pabc;Password=pabc;Database=Pabc"
      Oidc__Authority: "http://keycloak:8080/realms/zaakafhandelcomponent/"
      Oidc__ClientId: "pabc"
      Oidc__ClientSecret: "pabcClientSecret"
      Oidc__FunctioneelBeheerderRole: "administrator"
      # in our Docker Compose setup we run Keycloak on HTTP
      Oidc__RequireHttps: "false"
      KeycloakAdmin__ClientId: "pabc-admin-client"
      KeycloakAdmin__ClientSecret: "pabcAdminClientSecret"
