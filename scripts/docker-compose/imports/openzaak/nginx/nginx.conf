# nginx reverse proxy configuration for Open Zaak.
# This is needed to handle chunked transfer encoding (Transfer-Encoding: chunked) from
# ZAC's Apache HttpClient, which does not set Content-Length for large JSON request bodies.
# uwsgi in HTTP mode does not buffer chunked request bodies before passing them to Django,
# which causes Django to receive an empty body and return a 400 "required fields missing" error.
# nginx buffers the full request body by default (proxy_request_buffering on) and forwards
# it to uwsgi with Content-Length set, matching the production Kubernetes setup where nginx
# also sits in front of Open Zaak.
server {
    listen 8000;

    # Allow large file uploads (Open Zaak receives files as base64-encoded JSON).
    # ZAC's max file size is 80MB; base64 encoding adds ~33%, so set this higher.
    client_max_body_size 256m;

    location / {
        proxy_pass http://openzaak.local:8000;
        proxy_set_header Host $http_host;
        # proxy_request_buffering is on by default: nginx buffers the full request body
        # before forwarding, decoding chunked encoding and setting Content-Length.
    }
}
