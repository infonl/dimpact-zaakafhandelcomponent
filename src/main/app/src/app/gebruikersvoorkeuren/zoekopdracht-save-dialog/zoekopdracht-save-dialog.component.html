<mat-toolbar role="heading" class="gap-16" mat-dialog-title>
  <mat-icon>save</mat-icon>
  <span class="flex-grow-1">
    {{ "title.zoekopdrachten.opslaan" | translate }}
  </span>
  <button mat-icon-button (click)="close()">
    <mat-icon>close</mat-icon>
  </button>
</mat-toolbar>
<mat-divider></mat-divider>

<form [formGroup]="form" (submit)="opslaan()" (cancel)="close()">
  <mat-dialog-content>
    <fieldset class="p-0">
      <section class="row">
        <zac-auto-complete
          class="col-12"
          [form]="form"
          key="naam"
          [options]="options"
        ></zac-auto-complete>
      </section>
    </fieldset>
  </mat-dialog-content>
  <zac-form-actions
    [form]="form"
    [mutation]="mutation"
    [submitLabel]="submitLabel()"
    wrapper="dialog"
  />
</form>
