<mat-toolbar role="heading" class="gap-16" mat-dialog-title>
  <mat-icon>save</mat-icon>
  <span class="flex-grow-1">
    {{ "title.zoekopdrachten.opslaan" | translate }}
  </span>
  <button mat-icon-button (click)="close()">
    <mat-icon>close</mat-icon>
  </button>
</mat-toolbar>
<mat-divider></mat-divider>

<form [formGroup]="form" (submit)="opslaan()">
  <mat-dialog-content>
    <fieldset class="p-0">
      <section class="row">
        <zac-auto-complete
          class="col-12"
          [form]="form"
          key="naam"
          [options]="options"
        ></zac-auto-complete>
      </section>
    </fieldset>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button
      mat-raised-button
      type="submit"
      color="primary"
      [disabled]="form.invalid || form.pristine"
      id="opslaan_button"
    >
      {{ submitLabel() | translate }}
    </button>
    <button
      mat-raised-button
      type="button"
      (click)="close()"
      id="dialogClose_button"
    >
      {{ "actie.annuleren" | translate }}
    </button>
  </mat-dialog-actions>
</form>
