<div class="process-definition-item">
  <div class="flex-row gap-20">
    <zac-static-text label="versie" [value]="processDefinition.version" />
    <zac-static-text
      label="proces-definitie.sleutel"
      [value]="processDefinition.key"
    />
  </div>
  <div class="table-wrapper">
    <table mat-table [dataSource]="formsDataSource">
      <ng-container matColumnDef="index">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let row; index as i">{{ i + 1 }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>
          {{ "naam" | translate }}
        </th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>
          {{ "titel" | translate }}
        </th>
        <td mat-cell *matCellDef="let row">{{ row.title }}</td>
      </ng-container>

      <ng-container matColumnDef="id" stickyEnd>
        <th mat-header-cell *matHeaderCellDef>
          <button
            mat-icon-button
            title="{{ 'actie.toevoegen' | translate }}"
            (click)="uploadBpmnForm()"
          >
            <mat-icon>add_circle</mat-icon>
          </button>
        </th>
        <td mat-cell *matCellDef="let row">
          <button
            mat-icon-button
            id="delete"
            title="{{ 'actie.verwijderen' | translate }}"
            (click)="deleteBpmnForm(row)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
    @if (formsDataSource.data.length === 0) {
      <p>{{ "msg.geen.gegevens.gevonden" | translate }}</p>
    }
  </div>
</div>
