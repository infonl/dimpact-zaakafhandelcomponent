<input
  type="file"
  #bpmnFormFileInput
  accept=".json"
  (change)="bpmnFormFileSelected($event)"
  style="display: none"
/>
<div class="process-definition-item">
  <div class="flex-row gap-20">
    <zac-static-text label="versie" [value]="processDefinition.version" />
    <zac-static-text
      label="bpmn-procesdefinitie.sleutel"
      [value]="processDefinition.key"
    />
    <zac-static-text
      label="bpmn-procesdefinitie.uploaded-datum"
      [value]="processDefinition.details?.uploadDate | date: 'medium'"
    />
    <zac-static-text
      label="bpmn-procesdefinitie.gewijzigd-datum"
      [value]="processDefinition.details?.modificationDate | date: 'medium'"
    />
    <zac-static-text
      label="bpmn-procesdefinitie.documentatie"
      [value]="processDefinition.details?.documentation"
    />
  </div>
  <div class="table-wrapper">
    <table
      mat-table
      [dataSource]="processDefinition.details?.forms ?? []"
      class="mat-elevation-z8"
    >
      <ng-container matColumnDef="index">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let row; index as i">{{ i + 1 }}</td>
      </ng-container>

      <ng-container matColumnDef="uploaded">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          @if (row.uploaded) {
            <mat-icon
              color="primary"
              matTooltip="{{ 'bpmn-procesdefinitie.formulier.geupload' | translate }}"
              >check_circle</mat-icon
            >
          } @else {
            <mat-icon
              color="warn"
              matTooltip="{{ 'bpmn-procesdefinitie.formulier.niet-geupload' | translate }}"
              >error</mat-icon
            >
          }
        </td>
      </ng-container>

      <ng-container matColumnDef="formKey">
        <th mat-header-cell *matHeaderCellDef>
          {{ "naam" | translate }}
        </th>
        <td mat-cell *matCellDef="let row" [class.not-uploaded]="!row.uploaded">
          {{ row.formKey }}
        </td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>
          {{ "titel" }}
        </th>
        <td mat-cell *matCellDef="let row" [class.not-uploaded]="!row.uploaded">
          {{ row.title | empty }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions" stickyEnd>
        <th mat-header-cell *matHeaderCellDef>
          <button
            mat-icon-button
            title="{{ 'actie.toevoegen' | translate }}"
            (click)="uploadBpmnForm()"
          >
            <mat-icon>add_circle</mat-icon>
          </button>
        </th>
        <td mat-cell *matCellDef="let row">
          @if (row.uploaded) {
            <button
              mat-icon-button
              id="delete"
              title="{{ 'actie.verwijderen' | translate }}"
              (click)="deleteBpmnForm(processDefinition.key, row.formKey)"
            >
              <mat-icon>delete</mat-icon>
            </button>
          }
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
    @if (processDefinition.details?.forms?.length === 0) {
      <p>{{ "msg.geen.gegevens.gevonden" | translate }}</p>
    }
  </div>
</div>
