<mat-toolbar role="heading" class="gap-16" mat-dialog-title>
  <mat-icon>table_view</mat-icon>
  <span class="flex-grow-1">{{
    "referentietabel.wijzigen.titel" | translate
  }}</span>
  <button
    mat-icon-button
    (click)="close()"
    [attr.aria-label]="'actie.annuleren' | translate"
  >
    <mat-icon>close</mat-icon>
  </button>
</mat-toolbar>
<mat-divider></mat-divider>

<form [formGroup]="form" (submit)="submit()" (cancel)="close()">
  <mat-dialog-content>
    <mat-form-field class="full-width">
      <mat-label>{{ "tabel" | translate }}</mat-label>
      <input matInput formControlName="code" />
    </mat-form-field>
    <mat-form-field class="full-width">
      <mat-label>{{ "naam" | translate }}</mat-label>
      <input matInput formControlName="naam" required cdkFocusInitial />
      <mat-error>{{ "validators.required" | translate }}</mat-error>
    </mat-form-field>
  </mat-dialog-content>
  <zac-form-actions
    [form]="form"
    [mutation]="mutation"
    wrapper="dialog"
    submitLabel="actie.opslaan"
  />
</form>
