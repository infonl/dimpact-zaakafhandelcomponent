<div class="referentie-tabel-item">
  <table mat-table [dataSource]="tabel().waarden ?? []">
    <ng-container matColumnDef="index">
      <th mat-header-cell *matHeaderCellDef>#</th>
      <td mat-cell *matCellDef="let row; index as i">{{ i + 1 }}</td>
    </ng-container>

    <ng-container matColumnDef="naam">
      <th mat-header-cell *matHeaderCellDef>{{ "rij" | translate }}</th>
      <td mat-cell *matCellDef="let row">{{ row.naam | empty }}</td>
    </ng-container>

    <ng-container matColumnDef="actions" stickyEnd>
      <th mat-header-cell *matHeaderCellDef>
        <div class="tabel-actions flex-row items-center justify-end">
          <button
            mat-icon-button
            [matTooltip]="'actie.toevoegen' | translate"
            (click)="addWaarde()"
          >
            <mat-icon>add_circle</mat-icon>
          </button>
        </div>
      </th>
      <td mat-cell *matCellDef="let row">
        <div class="tabel-actions flex-row items-center justify-end">
          <span
            [matTooltip]="
              row.systemValue
                ? ('referentietabel.systeem.waarde.beschermd' | translate)
                : ('actie.bewerken' | translate)
            "
          >
            <button
              mat-icon-button
              [disabled]="row.systemValue"
              (click)="editWaarde(row)"
            >
              <mat-icon>edit</mat-icon>
            </button>
          </span>
          <span
            [matTooltip]="
              row.systemValue
                ? ('referentietabel.systeem.waarde.beschermd' | translate)
                : ('actie.verwijderen' | translate)
            "
          >
            <button
              mat-icon-button
              [disabled]="row.systemValue"
              (click)="deleteWaarde(row)"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </span>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>

  @if ((tabel().waarden?.length ?? 0) === 0) {
    <p class="no-data">{{ "msg.geen.gegevens.gevonden" | translate }}</p>
  }
</div>
