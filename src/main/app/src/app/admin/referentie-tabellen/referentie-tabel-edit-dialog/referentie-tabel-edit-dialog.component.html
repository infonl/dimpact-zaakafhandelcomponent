<mat-toolbar role="heading" class="gap-16" mat-dialog-title>
  <mat-icon>table_view</mat-icon>
  <span class="flex-grow-1">{{
    "referentietabel.wijzigen.titel" | translate
  }}</span>
  <button mat-icon-button (click)="close()">
    <mat-icon>close</mat-icon>
  </button>
</mat-toolbar>
<mat-divider></mat-divider>

<form [formGroup]="form" (submit)="submit()" (cancel)="close()">
  <mat-dialog-content>
    <zac-input readonly [form]="form" key="code" label="tabel" />
    <zac-input [form]="form" key="name" />
  </mat-dialog-content>
  <mat-dialog-actions>
    <zac-form-actions
      [form]="form"
      [mutation]="mutation"
      submitLabel="actie.opslaan"
    />
  </mat-dialog-actions>
</form>
