<mat-tab-group mat-stretch-tabs="false">
  <mat-tab [disabled]="!overigeRechtenQuery.data()?.brpZoeken">
    <ng-template mat-tab-label>
      <span
        style="pointer-events: auto"
        [matTooltip]="
          !overigeRechtenQuery.data()?.brpZoeken
            ? ('msg.rechten.geen.persoon.koppelen' | translate)
            : ''
        "
      >
        <mat-icon>emoji_people</mat-icon>
        {{ "actie.zoeken.persoon" | translate }}
      </span>
    </ng-template>
    <zac-persoon-zoek (persoon)="klantGeselecteerd($event)"></zac-persoon-zoek>
  </mat-tab>
  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon>business</mat-icon>
      {{ "actie.zoeken.bedrijf" | translate }}
    </ng-template>
    <zac-bedrijf-zoek (bedrijf)="klantGeselecteerd($event)"></zac-bedrijf-zoek>
  </mat-tab>
</mat-tab-group>
