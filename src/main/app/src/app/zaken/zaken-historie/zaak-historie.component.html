<div class="table-wrapper">
  <table mat-table matSort #historieSort="matSort" [dataSource]="historie">
    <ng-container matColumnDef="datum">
      <th *matHeaderCellDef mat-header-cell mat-sort-header>
        {{ "datum" | translate }}
      </th>
      <td *matCellDef="let regel" mat-cell>
        <div matTooltip="{{ regel.datumTijd | datum: 'short' }}">
          {{ regel.datumTijd | datum | empty }}
        </div>
      </td>
    </ng-container>
    <ng-container matColumnDef="gebruiker">
      <th *matHeaderCellDef mat-header-cell mat-sort-header>
        {{ "door" | translate }}
      </th>
      <td *matCellDef="let regel" mat-cell>
        <div>{{ regel.door | empty }}</div>
      </td>
    </ng-container>
    <ng-container matColumnDef="wijziging">
      <th mat-header-cell *matHeaderCellDef>
        {{ "gegeven" | translate }}
      </th>
      <td mat-cell *matCellDef="let regel">
        <read-more
          [text]="regel.attribuutLabel | translate"
          [maxLength]="20"
        ></read-more>
      </td>
    </ng-container>
    <ng-container matColumnDef="actie">
      <th mat-header-cell *matHeaderCellDef>
        {{ "actie" | translate }}
      </th>
      <td mat-cell *matCellDef="let regel">
        <read-more
          [text]="
            regel.actie && ('action.case.' + regel.actie | translate)
          "
          [maxLength]="20"
        ></read-more>
      </td>
    </ng-container>
    <ng-container matColumnDef="oudeWaarde">
      <th mat-header-cell *matHeaderCellDef>
        {{ "waarde.oud" | translate }}
      </th>
      <td mat-cell *matCellDef="let regel">
        <read-more
          *ngIf="regel.attribuutLabel !== 'zaakgeometrie'"
          [text]="regel.oudeWaarde | empty"
          [maxLength]="20"
        ></read-more>
        <read-more
          *ngIf="regel.attribuutLabel === 'zaakgeometrie'"
          [text]="regel.oudeWaarde | location | empty"
          [maxLength]="20"
        ></read-more>
      </td>
    </ng-container>
    <ng-container matColumnDef="nieuweWaarde">
      <th mat-header-cell *matHeaderCellDef>
        {{ "waarde.nieuw" | translate }}
      </th>
      <td mat-cell *matCellDef="let regel">
        <read-more
          *ngIf="regel.attribuutLabel !== 'zaakgeometrie'"
          [text]="regel.nieuweWaarde | empty | mimetypeToExtension"
          [maxLength]="20"
        ></read-more>
        <read-more
          *ngIf="regel.attribuutLabel === 'zaakgeometrie'"
          [text]="
            regel.nieuweWaarde | location | empty | mimetypeToExtension
          "
          [maxLength]="20"
        ></read-more>
      </td>
    </ng-container>
    <ng-container matColumnDef="toelichting">
      <th mat-header-cell *matHeaderCellDef>
        {{ "reden" | translate }}
      </th>
      <td mat-cell *matCellDef="let regel">
        <read-more [text]="regel.toelichting" [maxLength]="20"></read-more>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="historieColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: historieColumns"></tr>
  </table>
</div>
