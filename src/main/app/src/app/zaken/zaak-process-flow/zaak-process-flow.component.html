<mat-toolbar role="heading" class="gap-16">
  <mat-icon>flowsheet</mat-icon>
  <h3 class="flex-grow-1">
    {{ "actie.processtroom.bekijken" | translate }} —
    {{ bpmnProcessDefinition().processDefinitionName }}
    - {{ "versie" | translate }}
    {{ bpmnProcessDefinition().processDefinitionVersion }}
  </h3>
  <button
    mat-icon-button
    (click)="zoomOut()"
    [disabled]="zoomLevel() <= 0.25"
    [matTooltip]="'actie.zoom.out' | translate"
  >
    <mat-icon>remove</mat-icon>
  </button>
  <button
    mat-icon-button
    (click)="resetZoom()"
    [matTooltip]="'actie.zoom.reset' | translate"
  >
    <mat-icon>zoom_out_map</mat-icon>
  </button>
  <button
    mat-icon-button
    (click)="zoomIn()"
    [disabled]="zoomLevel() >= 4"
    [matTooltip]="'actie.zoom.in' | translate"
  >
    <mat-icon>add</mat-icon>
  </button>
  <button mat-icon-button (click)="sideNav().close()">
    <mat-icon>close</mat-icon>
  </button>
</mat-toolbar>
<mat-divider></mat-divider>
<div class="diagram-container">
  <img
    [src]="'/rest/zaken/' + zaakUuid() + '/process-diagram?t=' + cacheBuster"
    alt="Click to zoom"
    [style.transform]="'scale(' + zoomLevel() + ')'"
    (click)="zoomIn()"
    class="diagram-image"
  />
</div>
